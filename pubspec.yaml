name: lingua_boost
description: "LinguaBoost — turn the sentences you actually need into a personal language course"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.8.0

  # State Management
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3

  # Navigation
  go_router: ^17.1.0

  # Audio / Voice
  flutter_tts: ^4.2.3
  speech_to_text: ^7.0.0
  permission_handler: ^12.0.1

  # Fonts
  google_fonts: ^8.0.2

  # UI
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^2.0.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1

  path_provider: ^2.1.5

  # Sharing & URLs
  share_plus: ^10.1.3
  url_launcher: ^6.3.1

  # Local Storage
  shared_preferences: ^2.3.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.2
  connectivity_plus: ^7.0.0
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1

  # Auth
  google_sign_in: ^6.2.1

  # In-App Purchases
  purchases_flutter: ^8.0.0

  cupertino_icons: ^1.0.8
  google_mlkit_translation: ^0.14.0
  audioplayers: ^6.7.1
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^3.0.0-dev.11

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - 'assets/icons/Main icon/'
    - assets/animations/
    - assets/fonts/
    - assets/backgrounds/

  fonts:
    - family: coolicons
      fonts:
        - asset: assets/fonts/coolicons.ttf
